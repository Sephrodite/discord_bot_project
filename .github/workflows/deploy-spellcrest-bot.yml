name: Deploy SpellCrest Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-spellcrest-bot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write SSH key
        shell: bash
        env:
          SSH_KEY: ${{ secrets.SPELLCREST_VM_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/spellcrest_key
          chmod 600 ~/.ssh/spellcrest_key

      - name: Add VM to known_hosts
        shell: bash
        run: |
          ssh-keyscan -H ${{ secrets.SPELLCREST_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              -i ~/.ssh/spellcrest_key \
              ${{ secrets.SPELLCREST_VM_USER }}@${{ secrets.SPELLCREST_VM_HOST }} \
              "whoami && hostname"

      - name: Deploy to SpellCrest VM
        shell: bash
        run: |
          ssh -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=no \
              -i ~/.ssh/spellcrest_key \
              ${{ secrets.SPELLCREST_VM_USER }}@${{ secrets.SPELLCREST_VM_HOST }} \
              "~/deploy-spellcrest-bot.sh"
