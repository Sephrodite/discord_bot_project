name: Deploy SpellCrest Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-spellcrest-bot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key
        shell: bash
        run: |
          cat > spellcrest_key <<'EOF'
          ${{ secrets.SPELLCREST_VM_SSH_KEY }}
          EOF
          chmod 600 spellcrest_key

      - name: Check key file was written
        shell: bash
        run: |
          ls -l spellcrest_key
          head -n 1 spellcrest_key
          tail -n 1 spellcrest_key

      - name: Add VM to known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SPELLCREST_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -i spellcrest_key \
            ${{ secrets.SPELLCREST_VM_USER }}@${{ secrets.SPELLCREST_VM_HOST }} \
            "whoami && hostname"

      - name: Deploy to SpellCrest VM
        shell: bash
        run: |
          ssh -i spellcrest_key \
            ${{ secrets.SPELLCREST_VM_USER }}@${{ secrets.SPELLCREST_VM_HOST }} \
            "~/deploy-spellcrest-bot.sh"
